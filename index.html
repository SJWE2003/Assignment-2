<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">📦 Inventory Manager</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Dashboard</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <main class="dashboard">
            <h1>Inventory Dashboard</h1>
            
            <!-- Add Item Form -->
            <section class="form-section">
                <h2>Add New Item</h2>
                <form id="itemForm" class="item-form">
                    <div class="form-group">
                        <label for="itemName">Item Name</label>
                        <input 
                            type="text" 
                            id="itemName" 
                            placeholder="Enter item name" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="itemQuantity">Quantity</label>
                        <input 
                            type="number" 
                            id="itemQuantity" 
                            placeholder="Enter quantity" 
                            min="1" 
                            step="1"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Price</label>
                        <input 
                            type="number" 
                            id="itemPrice" 
                            placeholder="Enter price" 
                            min="0" 
                            step="0.01" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Add Item</button>
                </form>
            </section>

            <!-- Inventory List -->
            <section class="inventory-section">
                <h2>Inventory Items</h2>
                <div id="inventoryList" class="inventory-list">
                    <p class="empty-message">No items in inventory yet. Add one to get started!</p>
                </div>
                <button id="clearAllBtn" class="btn btn-secondary" style="display: none;">Clear All Items</button>
            </section>

            <!-- Statistics Section -->
            <section class="stats-section">
                <h2>Inventory Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>Total Items</h4>
                        <p id="totalItems" class="stat-value">0</p>
                    </div>
                    <div class="stat-card">
                        <h4>Total Quantity</h4>
                        <p id="totalQuantity" class="stat-value">0</p>
                    </div>
                </div>
            </section>

            <!-- Charts Section -->
            <section class="charts-section">
                <h2>Inventory Visualization</h2>
                <div class="charts-grid">
                    <div class="chart-container">
                        <h4>Items by Quantity (Bar Chart)</h4>
                        <canvas id="barChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h4>Quantity Distribution (Pie Chart)</h4>
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
